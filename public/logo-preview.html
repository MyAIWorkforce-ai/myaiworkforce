<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #0A0A0A; display: flex; flex-wrap: wrap; gap: 40px; padding: 40px; font-family: sans-serif; }
  .logo { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { color: #888; font-size: 13px; }
</style>
</head>
<body>

<!-- LOGO 1: Neural Circuit AI -->
<div class="logo">
  <svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Circuit nodes -->
    <circle cx="8" cy="30" r="3" fill="#F97316"/>
    <line x1="11" y1="30" x2="20" y2="30" stroke="#F97316" stroke-width="1.5"/>
    <circle cx="20" cy="30" r="2" fill="#FFD700"/>
    <line x1="20" y1="28" x2="20" y2="15" stroke="#FFD700" stroke-width="1"/>
    <circle cx="20" cy="15" r="2" fill="#FFD700"/>
    <!-- AI text -->
    <text x="28" y="42" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#F97316">AI</text>
    <!-- My Workforce -->
    <text x="28" y="56" font-family="Arial, sans-serif" font-size="11" fill="#FFD700" letter-spacing="2">MY WORKFORCE</text>
    <!-- Right circuit -->
    <circle cx="85" cy="20" r="2" fill="#FFD700"/>
    <line x1="85" y1="22" x2="85" y2="30" stroke="#FFD700" stroke-width="1"/>
    <circle cx="85" cy="30" r="2" fill="#F97316"/>
    <line x1="87" y1="30" x2="95" y2="30" stroke="#F97316" stroke-width="1.5"/>
    <circle cx="95" cy="30" r="3" fill="#F97316"/>
  </svg>
  <span class="label">1. Neural Circuit</span>
</div>

<!-- LOGO 2: Hexagon Mark -->
<div class="logo">
  <svg width="180" height="60" viewBox="0 0 180 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Hexagon -->
    <polygon points="30,5 52,5 64,26 52,47 30,47 18,26" fill="none" stroke="#FFD700" stroke-width="2.5"/>
    <polygon points="30,5 52,5 64,26 52,47 30,47 18,26" fill="rgba(255,215,0,0.08)"/>
    <!-- AI inside hex -->
    <text x="28" y="34" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#F97316">AI</text>
    <!-- My Workforce -->
    <text x="74" y="22" font-family="Arial Black, sans-serif" font-weight="900" font-size="15" fill="#FFD700">My</text>
    <text x="74" y="38" font-family="Arial Black, sans-serif" font-weight="900" font-size="15" fill="#FFD700">Workforce</text>
  </svg>
  <span class="label">2. Hexagon Mark</span>
</div>

<!-- LOGO 3: Abstract Brain -->
<div class="logo">
  <svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Brain outline (simplified) -->
    <path d="M10,35 C10,20 18,12 28,14 C30,8 38,6 44,12 C50,6 60,10 60,20 C66,18 70,26 66,34 C68,42 62,48 54,46 C50,52 40,52 36,46 C28,50 18,46 18,38 Z" 
          fill="none" stroke="#F97316" stroke-width="2"/>
    <!-- Brain dots -->
    <circle cx="30" cy="25" r="2" fill="#FFD700"/>
    <circle cx="40" cy="20" r="2" fill="#FFD700"/>
    <circle cx="50" cy="25" r="2" fill="#FFD700"/>
    <circle cx="35" cy="35" r="2" fill="#FFD700"/>
    <circle cx="48" cy="35" r="2" fill="#FFD700"/>
    <!-- Connect dots -->
    <line x1="30" y1="25" x2="40" y2="20" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <line x1="40" y1="20" x2="50" y2="25" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <line x1="30" y1="25" x2="35" y2="35" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <line x1="50" y1="25" x2="48" y2="35" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <line x1="35" y1="35" x2="48" y2="35" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <!-- Text -->
    <text x="78" y="28" font-family="Arial Black, sans-serif" font-weight="900" font-size="14" fill="#FFD700">My <tspan fill="#F97316">AI</tspan></text>
    <text x="78" y="46" font-family="Arial Black, sans-serif" font-weight="900" font-size="14" fill="#FFD700">Workforce</text>
  </svg>
  <span class="label">3. Abstract Brain</span>
</div>

<!-- LOGO 4: Stacked Badge -->
<div class="logo">
  <svg width="160" height="60" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Badge square -->
    <rect x="2" y="2" width="56" height="56" rx="10" fill="#0A0A0A" stroke="#FFD700" stroke-width="2"/>
    <rect x="2" y="2" width="56" height="56" rx="10" fill="rgba(249,115,22,0.1)"/>
    <!-- M -->
    <text x="8" y="30" font-family="Arial Black, sans-serif" font-weight="900" font-size="20" fill="#FFD700">M</text>
    <!-- AI -->
    <text x="10" y="52" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#F97316">AI</text>
    <!-- Workforce text -->
    <text x="70" y="25" font-family="Arial Black, sans-serif" font-weight="900" font-size="15" fill="#FFD700">My</text>
    <text x="70" y="41" font-family="Arial Black, sans-serif" font-weight="900" font-size="13" fill="#F97316">AI</text>
    <text x="70" y="57" font-family="Arial Black, sans-serif" font-weight="900" font-size="13" fill="#FFD700">Workforce</text>
  </svg>
  <span class="label">4. Stacked Badge</span>
</div>

<!-- LOGO 5: Infinity Loop -->
<div class="logo">
  <svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Infinity shape -->
    <path d="M20,30 C20,18 30,12 40,18 C50,24 50,36 60,36 C70,36 80,30 80,24 C80,18 70,12 60,18 C50,24 50,36 40,36 C30,36 20,42 20,30 Z" 
          fill="none" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <defs>
      <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#F97316"/>
        <stop offset="100%" style="stop-color:#FFD700"/>
      </linearGradient>
    </defs>
    <!-- Circuit dots on loop -->
    <circle cx="20" cy="30" r="3" fill="#F97316"/>
    <circle cx="50" cy="27" r="2.5" fill="#FFD700"/>
    <circle cx="80" cy="24" r="3" fill="#FFD700"/>
    <!-- Text -->
    <text x="95" y="28" font-family="Arial Black, sans-serif" font-weight="900" font-size="14" fill="#FFD700">My <tspan fill="#F97316">AI</tspan></text>
    <text x="95" y="46" font-family="Arial Black, sans-serif" font-weight="900" font-size="14" fill="#FFD700">Workforce</text>
  </svg>
  <span class="label">5. Infinity Loop</span>
</div>

</body>
</html>
